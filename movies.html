<!DOCTYPE html>
<html>
<head>
    <title>All Movies - AwakeMovies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: {{ colors.background }}; }
        .navbar { background-color: {{ colors.primary }}; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">AwakeMovies Admin</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header bg-primary text-white">All Uploaded Movies</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Type</th>
                            <th>Source</th>
                            <th>Date Posted</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for movie in movies %}
                        <tr>
                            <td>{{ movie.title }}</td>
                            <td>{{ movie.type }}</td>
                            <td>{{ movie.source }}</td>
                            <td>{{ movie.posted_at.strftime('%Y-%m-%d %H:%M') }}</td>
                            <td><a href="{{ movie.wp_url }}" class="btn btn-sm btn-info" target="_blank">View</a></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
