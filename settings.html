<!DOCTYPE html>
<html>
<head>
    <title>Settings - AwakeMovies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: {{ colors.background }}; }
        .navbar { background-color: {{ colors.primary }}; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">AwakeMovies Admin</a>
            <div class="d-flex">
                <a href="/" class="btn btn-outline-light me-2">Dashboard</a>
                <a href="/logout" class="btn btn-danger">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 mx-auto">
                <div class="card">
                    <div class="card-header bg-primary text-white">System Settings</div>
                    <div class="card-body">
                        <form method="POST">
                            <h5>Automation</h5>
                            <div class="mb-3">
                                <label class="form-label">Posts Per Run</label>
                                <input type="number" class="form-control" value="{{ config.POSTS_PER_RUN }}">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Delay Between Posts (seconds)</label>
                                <input type="number" class="form-control" value="{{ config.DELAY_BETWEEN_POSTS }}">
                            </div>
                            <hr>
                            <h5>Sources</h5>
                            <div class="mb-3">
                                <label class="form-label">Active Sites (one per line)</label>
                                <textarea class="form-control" rows="5">{% for site in config.SOURCE_SITES %}{{ site }}
{% endfor %}</textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Save Settings</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
